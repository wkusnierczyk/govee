name: Clippy Analysis
on:
  push:
    branches: [main]
  pull_request:
permissions:
  security-events: write
  contents: read
jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@45d98f9988a5d4cbe2e421bfe7df5f04cf33b9e7 # stable
        with:
          components: clippy
      - run: cargo install clippy-sarif sarif-fmt
      - run: cargo clippy --message-format=json -- -D warnings | clippy-sarif | tee results.sarif | sarif-fmt
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@5cf07d8b700b67e235fbb65cbc84f69c0cf10464 # v3
        with:
          sarif_file: results.sarif
